<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gabriel Pedraza - Operations Systems Builder</title>
    <meta name="description" content="Gabriel Pedraza turns scattered operations into structured, repeatable systems. Lead project manager, process architect, and operations consultant." />

    <!-- Google Fonts: Inter, Playfair Display, JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>

    <!-- Noise texture SVG filter -->
    <svg style="position:fixed;top:0;left:0;width:0;height:0;pointer-events:none;">
      <defs>
        <filter id="noise-filter">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
          <feColorMatrix type="saturate" values="0" />
        </filter>
      </defs>
    </svg>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
